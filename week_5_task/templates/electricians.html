{% extends 'base.html' %}

{% block content %}


<div class="content">
    <h2>Electricians</h2>
    

    <!-- FORM -->
    <form method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="text" name="experience" placeholder="Experience" required>
        <button>Add</button>
    </form>

    <!-- TABLE -->
    <table>
        <tr>
            <th>Profile</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Experience</th>
        </tr>

        {% for e in data %}
        <tr>
            <td>
                <img class="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </td>
            <td>{{ e.name }}</td>
            <td>{{ e.phone }}</td>
            <td>{{ e.experience }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
