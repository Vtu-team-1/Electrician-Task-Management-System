{% extends 'base.html' %}

{% block content %}


<!-- MAIN -->
<div class="content">
    <h2>🧱 Materials Management</h2>

    
<form method="POST">
    <input type="text" name="name" placeholder="Material Name" required>
    <input type="number" name="quantity" placeholder="Quantity" required>
    <input type="number" name="cost" placeholder="Cost" required>
    <button type="submit">Add Material</button>
</form>

<br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Quantity</th>
        <th>Cost</th>
    </tr>

    {% for m in data %}
    <tr>
        <td>{{ m.id }}</td>
        <td>{{ m.name }}</td>
        <td>{{ m.quantity }}</td>
        <td>{{ m.cost }}</td>
    </tr>
    {% endfor %}

</table>
{% endblock %}
